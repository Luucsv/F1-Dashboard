function getInitials(s) { return s.substring(0,2).toUpperCase(); }

function renderTable() {
  const i = parseInt(document.getElementById('raceSelect').value);
  const race = races[i];
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  race.results.forEach(r => {
    const t = teams[r.driver] || { team: "Unknown", color: "#888" };
    const diff = r.grid - r.pos;
    let cls = 'neutral', arrow = '—';
    if (diff > 0) { cls = 'gained'; arrow = '▲'+diff; }
    else if (diff < 0) { cls = 'lost'; arrow = '▼'+Math.abs(diff); }
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="pos">${r.pos}</td>
      <td><div class="driver-cell"><div class="avatar" style="background:${t.color}">${getInitials(r.driver)}</div><strong>${r.driver}</strong></div></td>
      <td style="color:#666">${t.team}</td>
      <td style="text-align:center;font-weight:600">${r.points}</td>
      <td style="text-align:center;color:#666">${r.grid}</td>
      <td style="text-align:center;color:#666;font-size:12px">${r.status}</td>
      <td style="text-align:center"><span class="badge ${cls}">${arrow}</span></td>`;
    tbody.appendChild(tr);
  });
}

const sel = document.getElementById('raceSelect');
races.forEach((r,i) => {
  const o = document.createElement('option');
  o.value = i;
  o.textContent = `R${r.round} — ${r.name}`;
  sel.appendChild(o);
});
renderTable();
